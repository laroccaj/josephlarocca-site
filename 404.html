<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | Page Not Found | Joseph LaRocca</title>

  <!-- Prevent indexing, allow link discovery -->
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/assets/css/styles.css" />

  <style>
    .error-wrap {
      text-align: center;
      padding: 4rem 1rem;
    }
    .error-code {
      font-size: clamp(3.5rem, 8vw, 5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--primary-color, #333);
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1.75rem;
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div class="nav">
        <div class="brand-logo" aria-hidden="true">Joseph LaRocca</div>
        <nav class="navlinks" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/bio/">Bio</a>
          <a href="/gallery/">Photo Gallery</a>
          <a href="/media/">Media Links</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card error-wrap">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p class="lead">
          The page you requested does not exist or may have been moved.
        </p>
        <p>
          You can return to the homepage or access one of the sections below.
        </p>

        <div class="error-actions">
          <a href="/" class="btn-action">Home</a>
          <a href="/bio/" class="btn-action">Biography</a>
          <a href="/media/" class="btn-action">Media Coverage</a>
          <a href="/gallery/" class="btn-action">Photo Gallery</a>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footerrow">
        <div>© 2026 Joseph LaRocca</div>
      </div>
    </div>
  </footer>
</body>
</html>
