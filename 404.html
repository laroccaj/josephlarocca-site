<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Joseph LaRocca</title>
  
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/assets/css/styles.css" />
  
  <style>
    .error-container {
      text-align: center;
      padding: 4rem 1rem;
    }
    .error-code {
      font-size: 5rem;
      font-weight: bold;
      color: var(--primary-color, #333);
      margin-bottom: 1rem;
    }
    .btn-home {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.8rem 1.5rem;
      background-color: var(--primary-color, #333);
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <div class="nav">
        <div class="brand-logo" aria-hidden="true">Joseph LaRocca</div>
        <nav class="navlinks" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/bio/">Bio</a>
          <a href="/gallery/">Photo Gallery</a>
          <a href="/media/">Media Links</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="card error-container">
        <div class="error-code">404</div>
        <h1>Oops! Page Not Found</h1>
        <p class="lead">The page you're looking for doesn't exist or has been moved.</p>
        <p>You may have followed an outdated link or mistyped the address.</p>
        
        <a href="/" class="btn-home">Return to Homepage</a>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footerrow">
        <div>© 2026 Joseph LaRocca</div>
      </div>
    </div>
  </footer>
</body>
</html>
